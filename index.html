<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voices of Our Mothers</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Allura&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  min-height: 100%;
  font-family: "Montserrat", Arial, sans-serif;
  background: #00351a;
}

.hero {
  min-height: 100vh;
  width: 100%;
  position: relative;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;

  background:
    radial-gradient(circle at -10% -15%,
      rgba(255,255,255,0.06) 0%,
      rgba(255,255,255,0.03) 30%,
      transparent 55%
    ),
    radial-gradient(circle at 120% 110%,
      rgba(255,255,255,0.025),
      transparent 45%
    ),
    linear-gradient(
      180deg,
      #1b6548 0%,
      #11543d 35%,
      #00351a 100%
    );
}

.content {
  position: relative;
  z-index: 5;
  width: 100%;
  max-width: 460px;
  min-height: 100vh;
  padding: 50px 28px 130px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.logo {
  width: 160px;
  max-width: 55vw;
  height: auto;
  margin-bottom: 26px;
  display: block;
}

h1 {
  color: #e8c05b;
  font-size: clamp(40px, 9vw, 60px);
  line-height: 0.95;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 28px;
  text-shadow: 0 3px 12px rgba(0,0,0,0.25);
}

.subtitle {
  color: #ffffff;
  font-family: "Allura", cursive;
  font-size: clamp(30px, 4vw, 42px);
  line-height: 1.25;
  font-weight: 400;
  max-width: 430px;
  margin-bottom: 32px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.25);
}

.dots {
  display: flex;
  gap: 10px;
  justify-content: center;
  align-items: center;
}

.dots span {
  width: 8px;
  height: 8px;
  background: #e8c05b;
  border-radius: 50%;
}

.start-btn {
  margin-top: 32px;
  background: #e8c05b;
  color: #00351a;
  text-decoration: none;
  padding: 15px 42px;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 800;
  transition: 0.3s ease;
  box-shadow: 0 8px 20px rgba(232,192,91,0.3);
}

.start-btn:hover {
  background: #f4cf72;
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(232,192,91,0.4);
}

.bottom-pattern {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 90px;
  object-fit: cover;
  object-position: center;
  z-index: 2;
  opacity: 0.85;

  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 38%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 38%);
}

.bottom-fade {
  position: absolute;
  left: 0;
  bottom: 60px;
  width: 100%;
  height: 190px;
  background: linear-gradient(
    180deg,
    rgba(0,53,26,0) 0%,
    rgba(0,53,26,0.25) 35%,
    rgba(0,53,26,0.65) 70%,
    #00351a 100%
  );
  z-index: 3;
  pointer-events: none;
}

@media (max-width: 600px) {
  .content {
    padding: 40px 24px 110px;
  }

  .logo {
    width: 145px;
    margin-bottom: 24px;
  }

  h1 {
    font-size: clamp(38px, 12vw, 48px);
  }

  .subtitle {
    font-size: 31px;
    max-width: 340px;
  }

  .start-btn {
    padding: 14px 36px;
    font-size: 15px;
  }

  .bottom-pattern {
    height: 65px;
  }

  .bottom-fade {
    bottom: 45px;
    height: 150px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <div class="content">
    <img src="./logo.png" alt="Voices of Our Mothers Logo" class="logo" />

    <h1>
      Voices of<br />
      Our Mothers
    </h1>

    <p class="subtitle">
      Preserving African maternal wisdom, oral histories, languages and
      cultural heritage through ethical AI.
    </p>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <a href="home.html" class="start-btn">Get Started</a>
  </div>

  <div class="bottom-fade"></div>

  <img src="./pattern.png" alt="" class="bottom-pattern" />

</section>

</body>
</html>
