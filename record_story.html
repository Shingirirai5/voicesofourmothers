<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Record Your Story</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
  min-height:100%;
  font-family:"Montserrat", Arial, sans-serif;
  background:#00351a;
}

.page{
  min-height:100vh;
  background:
    radial-gradient(circle at -10% -15%, rgba(255,255,255,.08), transparent 44%),
    linear-gradient(180deg,#1b6548 0%,#0b4a2d 44%,#00351a 100%);
  overflow-x:hidden;
}

.header{
  height:58px;
  background:#0b5a2a;
  color:#fff8dc;
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 18px;
  box-shadow:0 4px 14px rgba(0,0,0,.22);
}

.back{
  color:#fff8dc;
  text-decoration:none;
  font-size:27px;
  line-height:1;
}

.header-title{
  font-size:18px;
  font-weight:900;
}

.content-panel{
  width:min(92%,980px);
  margin:0 auto 36px;
  background:#fff8e9;
  border-radius:0 0 32px 32px;
  min-height:calc(100vh - 58px);
  padding:clamp(28px,5vw,70px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  box-shadow:0 18px 55px rgba(0,0,0,.22);
}

.timer{
  color:#242018;
  font-size:clamp(28px,5vw,54px);
  font-weight:900;
  margin-bottom:clamp(28px,5vw,55px);
  letter-spacing:.5px;
}

.wave-wrap{
  width:min(100%,620px);
  height:clamp(90px,17vw,180px);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-bottom:clamp(45px,7vw,85px);
}

.bar{
  width:clamp(4px,.8vw,8px);
  border-radius:999px;
  background:#1d8b55;
  animation:pulse 1.1s ease-in-out infinite;
  opacity:.95;
}

.bar:nth-child(1){height:28%;animation-delay:.05s}
.bar:nth-child(2){height:48%;animation-delay:.12s}
.bar:nth-child(3){height:70%;animation-delay:.19s}
.bar:nth-child(4){height:42%;animation-delay:.26s}
.bar:nth-child(5){height:82%;animation-delay:.33s}
.bar:nth-child(6){height:58%;animation-delay:.40s}
.bar:nth-child(7){height:92%;animation-delay:.47s}
.bar:nth-child(8){height:72%;animation-delay:.54s}
.bar:nth-child(9){height:55%;animation-delay:.61s}
.bar:nth-child(10){height:86%;animation-delay:.68s}
.bar:nth-child(11){height:62%;animation-delay:.75s}
.bar:nth-child(12){height:38%;animation-delay:.82s}
.bar:nth-child(13){height:68%;animation-delay:.89s}
.bar:nth-child(14){height:50%;animation-delay:.96s}
.bar:nth-child(15){height:34%;animation-delay:1.03s}
.bar:nth-child(16){height:44%;animation-delay:1.10s}
.bar:nth-child(n+13){background:#9aaa78}

@keyframes pulse{
  0%,100%{transform:scaleY(.55);opacity:.55}
  50%{transform:scaleY(1.15);opacity:1}
}

.record-btn{
  width:clamp(76px,12vw,118px);
  height:clamp(76px,12vw,118px);
  border:none;
  border-radius:50%;
  background:#e33c2f;
  color:#fff;
  font-size:clamp(32px,5vw,54px);
  cursor:pointer;
  box-shadow:
    0 12px 28px rgba(227,60,47,.35),
    inset 0 -5px 0 rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.25s ease;
}

.record-btn:hover{
  transform:translateY(-3px) scale(1.03);
  background:#f04a3d;
}

.record-btn:active{
  transform:scale(.96);
}

.instruction{
  margin-top:18px;
  color:#3d352a;
  font-size:clamp(13px,1.8vw,17px);
  font-weight:700;
}

.cancel{
  margin-top:24px;
  color:#d43b31;
  text-decoration:none;
  font-size:clamp(13px,1.6vw,16px);
  font-weight:800;
}

.cancel:hover{
  text-decoration:underline;
}

@media(max-width:720px){
  .content-panel{
    width:100%;
    margin-bottom:0;
    border-radius:0;
    padding:36px 18px;
    justify-content:flex-start;
    padding-top:54px;
  }

  .timer{
    font-size:24px;
    margin-bottom:40px;
  }

  .wave-wrap{
    height:100px;
    gap:4px;
    margin-bottom:70px;
  }

  .bar{
    width:4px;
  }

  .record-btn{
    width:76px;
    height:76px;
    font-size:32px;
  }
}

@media(min-width:900px){
  .header{
    width:min(92%,980px);
    margin:28px auto 0;
    border-radius:28px 28px 0 0;
  }

  .content-panel{
    border-radius:0 0 32px 32px;
    min-height:620px;
  }
}
</style>
</head>

<body>

<main class="page">

  <header class="header">
    <a href="home.html" class="back">←</a>
    <div class="header-title">Record Your Story</div>
  </header>

  <section class="content-panel">

    <div class="timer" id="timer">00:00:15</div>

    <div class="wave-wrap" aria-label="Recording audio waveform">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <button class="record-btn" id="recordBtn" aria-label="Stop recording">🎙</button>

    <div class="instruction" id="instruction">Tap to stop recording</div>

    <a href="home.html" class="cancel">Cancel</a>

  </section>

</main>

<script>
const btn = document.getElementById("recordBtn");
const instruction = document.getElementById("instruction");
const timer = document.getElementById("timer");
let recording = true;
let seconds = 15;

const interval = setInterval(() => {
  if(recording){
    seconds++;
    const mins = String(Math.floor(seconds / 60)).padStart(2, "0");
    const secs = String(seconds % 60).padStart(2, "0");
    timer.textContent = `00:${mins}:${secs}`;
  }
}, 1000);

btn.addEventListener("click", () => {
  recording = !recording;

  if(recording){
    btn.innerHTML = "🎙";
    instruction.textContent = "Tap to stop recording";
    document.querySelectorAll(".bar").forEach(bar => bar.style.animationPlayState = "running");
  }else{
    btn.innerHTML = "▶";
    instruction.textContent = "Recording paused. Tap to continue.";
    document.querySelectorAll(".bar").forEach(bar => bar.style.animationPlayState = "paused");
  }
});
</script>

</body>
</html>
